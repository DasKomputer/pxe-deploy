#-----prometheus.yml — Configuración de Prometheus-----#
#
# Aquí le decimos a Prometheus a quién tiene que consultar
# para recoger métricas y cada cuánto tiempo.
#
# Cada job es una fuente de métricas diferente.
# Prometheus va a cada una cada 15 segundos y guarda los datos.


global:
  scrape_interval: 15s   # Consultar cada 15 segundos


scrape_configs:

  # Prometheus: se monitoriza a sí mismo
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter: métricas del sistema de la RPi
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # cAdvisor: métricas de cada contenedor Docker
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

