#-----grub.cfg — Menú PXE para equipos con UEFI-----#
#                                                       
# Los equipos modernos con UEFI usan GRUB en lugar de   
# PXELINUX. Este fichero hace lo mismo que el default   
# de PXELINUX pero para UEFI.                           
#                                                       
# Ubicado en tftpboot/grub/grub.cfg                     


# Opción seleccionada por defecto (0 = la primera)
# La ponemos en la última (arranque local) para no
# instalar nada por accidente

set default=5
set timeout=30


#-----Opciones de instalación de sistemas operativos-----#

menuentry "Debian 13 CLI" {
  linux /debian-cli/vmlinuz auto=true priority=critical url=http://192.168.100.1/preseed/preseed-cli.cfg interface=auto quiet
  initrd /debian-cli/initrd.gz
}

menuentry "Debian 13 GUI (GNOME)" {
  linux /debian-gui/vmlinuz auto=true priority=critical url=http://192.168.100.1/preseed/preseed-gui.cfg interface=auto quiet
  initrd /debian-gui/initrd.gz
}

menuentry "Windows 11 Pro" {
  # Cargamos el bootloader de WinPE por chainloader
  chainloader /winpe/bootmgfw.efi
}


#-----Herramientas de diagnóstico y rescate-----#

menuentry "SystemRescue (reparacion y recuperacion)" {
  linux /systemrescue/vmlinuz archisobasedir=systemrescue
  initrd /systemrescue/initrd.img
}

menuentry "Clonezilla (clonado de discos)" {
  linux /clonezilla/vmlinuz boot=live union=overlay
  initrd /clonezilla/initrd.img
}

menuentry "Memtest86+ (test de memoria RAM)" {
  linux16 /memtest86/memtest
}


#-----Arrancar desde el disco local del equipo-----#

menuentry "Arrancar desde disco local" {
  exit
}


