#-----preseed-gui.cfg — Instalación desatendida Debian 13 + GNOME-----#
#
# Perfil: equipo de usuario final / estación de trabajo
# GNOME completo con ofimática y apps cotidianas en español.
#
# Contraseña inicial de user: abc123.
#
# Uso: http://192.168.100.1/preseed/preseed-gui.cfg


#-----Localización-----#
d-i debian-installer/locale             string es_ES.UTF-8
d-i keyboard-configuration/xkb-keymap  select es
d-i time/zone                           string Europe/Madrid
d-i clock-setup/utc                     boolean true
d-i clock-setup/ntp                     boolean true


#-----Red — DHCP automático-----#
d-i netcfg/choose_interface             select auto
d-i netcfg/get_hostname                 string equipo
d-i netcfg/get_domain                   string pxe.local
d-i netcfg/wireless_wep                 string


#-----Mirror-----#
d-i mirror/country                      string manual
d-i mirror/http/hostname                string deb.debian.org
d-i mirror/http/directory               string /debian
d-i mirror/http/proxy                   string
d-i mirror/suite                        string trixie


#-----Cuentas de usuario-----#
# Root desactivado. Usuario: user contraseña: abc123.
d-i passwd/root-login                   boolean false
d-i passwd/user-fullname                string Usuario
d-i passwd/username                     string user
d-i passwd/user-password-crypted        password $6$rcWre/X8ONPM2F4C$tHi8n4hthGj6BibUuSw2ymoXMqV3W/8IsB8dIc5uZzkngfBua8tCJhx2aPlNWYGQ2.UfizS0TrbDj.cz6.vuS.
# Grupos necesarios para dispositivos multimedia y periféricos
d-i passwd/user-default-groups          string sudo cdrom audio video plugdev netdev bluetooth


#-----Particionado — LVM sin cifrado-----#
#
#   /boot    500 MB   ext4   (fuera del LVM, necesario para GRUB)
#   swap     2 GB     LVM
#   /        20 GB    ext4   LVM  (SO + GNOME + apps)
#   /home    resto    ext4   LVM  (datos del usuario, separados
#                                  para sobrevivir reinstalaciones)
d-i partman-auto/disk                   string /dev/sda
d-i partman-auto/method                 string lvm
d-i partman-lvm/device_remove_lvm       boolean true
d-i partman-md/device_remove_md         boolean true
d-i partman-lvm/confirm                 boolean true
d-i partman-lvm/confirm_nooverwrite     boolean true

d-i partman-auto-lvm/guided_size        string max
d-i partman-auto-lvm/new_vg_name        string vg0

d-i partman-auto/choose_recipe          select custom-lvm
d-i partman-auto/expert_recipe          string              \
    custom-lvm ::                                           \
        500 500 500 ext4                                    \
            $primary{ }                                     \
            $bootable{ }                                    \
            method{ format }                                \
            format{ }                                       \
            use_filesystem{ }                               \
            filesystem{ ext4 }                              \
            mountpoint{ /boot }                             \
        .                                                   \
        2048 2048 2048 linux-swap                           \
            $lvmok{ }                                       \
            lv_name{ swap }                                 \
            method{ swap }                                  \
            format{ }                                       \
        .                                                   \
        20000 20000 20000 ext4                              \
            $lvmok{ }                                       \
            lv_name{ root }                                 \
            method{ format }                                \
            format{ }                                       \
            use_filesystem{ }                               \
            filesystem{ ext4 }                              \
            mountpoint{ / }                                 \
        .                                                   \
        10000 20000 -1 ext4                                 \
            $lvmok{ }                                       \
            lv_name{ home }                                 \
            method{ format }                                \
            format{ }                                       \
            use_filesystem{ }                               \
            filesystem{ ext4 }                              \
            mountpoint{ /home }                             \
        .

d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition                     select finish
d-i partman/confirm                              boolean true
d-i partman/confirm_nooverwrite                  boolean true


#-----Paquetes — GNOME completo + ofimática + apps de usuario-----#
tasksel tasksel/first                   multiselect gnome-desktop, standard

d-i pkgsel/include                      string \
    sudo \
    curl \
    wget \
    git \
    vim \
    bash-completion \
    net-tools \
    openssh-client \
    unattended-upgrades \
    apt-listchanges \
    zip \
    unzip \
    gnome-tweaks \
    gnome-shell-extensions \
    libreoffice \
    libreoffice-l10n-es \
    libreoffice-help-es \
    firefox-esr \
    firefox-esr-l10n-es-es \
    thunderbird \
    thunderbird-l10n-es-es \
    vlc \
    gimp \
    evince \
    file-roller \
    gparted \
    fonts-liberation \
    fonts-dejavu

d-i pkgsel/upgrade                      select full-upgrade
d-i pkgsel/update-policy                select unattended-upgrades
popularity-contest popularity-contest/participate boolean false


#-----Display manager — GDM3-----#
d-i shared/default-x-display-manager   select gdm3


#-----Bootloader-----#
d-i grub-installer/only_debian          boolean true
d-i grub-installer/bootdev              string default


#-----Post-instalación-----#
# Locale de GNOME en español + actualizaciones automáticas
d-i preseed/late_command string \
    in-target update-locale LANG=es_ES.UTF-8 LANGUAGE=es_ES:es; \
    in-target dpkg-reconfigure --frontend=noninteractive locales; \
    in-target systemctl enable unattended-upgrades


#-----Finalización-----#
d-i apt-setup/cdrom/set-first           boolean false
d-i finish-install/reboot_in_progress   note
d-i debian-installer/exit/poweroff      boolean false
