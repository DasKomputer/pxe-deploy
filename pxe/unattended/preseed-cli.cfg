#-----preseed-cli.cfg — Instalación desatendida Debian 13 CLI-----#
#
# Sin entorno gráfico. Gestión remota por SSH.
#
# Contraseña inicial de admin: abc123.
# Cámbiala tras el primer acceso con: passwd admin
#
# Uso: http://192.168.100.1/preseed/preseed-cli.cfg


#-----Localización-----#
d-i debian-installer/locale             string es_ES.UTF-8
d-i keyboard-configuration/xkb-keymap  select es
d-i time/zone                           string Europe/Madrid
d-i clock-setup/utc                     boolean true
d-i clock-setup/ntp                     boolean true


#-----Red — DHCP automático-----#
d-i netcfg/choose_interface             select auto
d-i netcfg/get_hostname                 string servidor
d-i netcfg/get_domain                   string pxe.local
d-i netcfg/wireless_wep                 string


#-----Mirror-----#
d-i mirror/country                      string manual
d-i mirror/http/hostname                string deb.debian.org
d-i mirror/http/directory               string /debian
d-i mirror/http/proxy                   string
d-i mirror/suite                        string trixie


#-----Cuentas de usuario-----#
# Root desactivado. Usuario: admin contraseña: abc123.
d-i passwd/root-login                   boolean false
d-i passwd/user-fullname                string Administrador
d-i passwd/username                     string admin
d-i passwd/user-password-crypted        password $6$rcWre/X8ONPM2F4C$tHi8n4hthGj6BibUuSw2ymoXMqV3W/8IsB8dIc5uZzkngfBua8tCJhx2aPlNWYGQ2.UfizS0TrbDj.cz6.vuS.
d-i passwd/user-default-groups          string sudo


#-----Particionado — LVM sin cifrado-----#
#
#   /boot    500 MB   ext4   (fuera del LVM, necesario para GRUB)
#   swap     2 GB     LVM
#   /        10 GB    ext4   LVM
#   /var     resto    ext4   LVM  (logs y datos de servicios
#                                  separados para no llenar /)
d-i partman-auto/disk                   string /dev/sda
d-i partman-auto/method                 string lvm
d-i partman-lvm/device_remove_lvm       boolean true
d-i partman-md/device_remove_md         boolean true
d-i partman-lvm/confirm                 boolean true
d-i partman-lvm/confirm_nooverwrite     boolean true

d-i partman-auto-lvm/guided_size        string max
d-i partman-auto-lvm/new_vg_name        string vg0

d-i partman-auto/choose_recipe          select custom-lvm
d-i partman-auto/expert_recipe          string              \
    custom-lvm ::                                           \
        500 500 500 ext4                                    \
            $primary{ }                                     \
            $bootable{ }                                    \
            method{ format }                                \
            format{ }                                       \
            use_filesystem{ }                               \
            filesystem{ ext4 }                              \
            mountpoint{ /boot }                             \
        .                                                   \
        2048 2048 2048 linux-swap                           \
            $lvmok{ }                                       \
            lv_name{ swap }                                 \
            method{ swap }                                  \
            format{ }                                       \
        .                                                   \
        10000 10000 10000 ext4                              \
            $lvmok{ }                                       \
            lv_name{ root }                                 \
            method{ format }                                \
            format{ }                                       \
            use_filesystem{ }                               \
            filesystem{ ext4 }                              \
            mountpoint{ / }                                 \
        .                                                   \
        5000 10000 -1 ext4                                  \
            $lvmok{ }                                       \
            lv_name{ var }                                  \
            method{ format }                                \
            format{ }                                       \
            use_filesystem{ }                               \
            filesystem{ ext4 }                              \
            mountpoint{ /var }                              \
        .

d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition                     select finish
d-i partman/confirm                              boolean true
d-i partman/confirm_nooverwrite                  boolean true


#-----Paquetes — orientados a servidor y administración remota-----#
tasksel tasksel/first                   multiselect standard, ssh-server

d-i pkgsel/include                      string \
    openssh-server \
    sudo \
    curl \
    wget \
    vim \
    tmux \
    htop \
    iotop \
    iftop \
    git \
    net-tools \
    iproute2 \
    iputils-ping \
    dnsutils \
    nmap \
    netcat-openbsd \
    rsync \
    lsof \
    strace \
    ufw \
    fail2ban \
    logrotate \
    unattended-upgrades \
    apt-listchanges \
    bash-completion \
    tree \
    jq \
    zip \
    unzip

d-i pkgsel/upgrade                      select full-upgrade
d-i pkgsel/update-policy                select unattended-upgrades
popularity-contest popularity-contest/participate boolean false


#-----Bootloader-----#
d-i grub-installer/only_debian          boolean true
d-i grub-installer/bootdev              string default


#-----Post-instalación-----#
# ufw restrictivo con solo SSH abierto + fail2ban + hardening SSH
d-i preseed/late_command string \
    in-target ufw default deny incoming; \
    in-target ufw default allow outgoing; \
    in-target ufw allow ssh; \
    in-target ufw --force enable; \
    in-target systemctl enable fail2ban; \
    in-target sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin no/' /etc/ssh/sshd_config; \
    in-target sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config


#-----Finalización-----#
d-i apt-setup/cdrom/set-first           boolean false
d-i finish-install/reboot_in_progress   note
d-i debian-installer/exit/poweroff      boolean false

